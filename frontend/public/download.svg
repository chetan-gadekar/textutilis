<svg width="200" height="200" viewBox="0 0 200 200" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <linearGradient id="grad1" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#4F46E5;stop-opacity:1"></stop>
      <stop offset="100%" style="stop-color:#06B6D4;stop-opacity:1"></stop>
    </linearGradient>
  </defs>

  <!-- Background Circle -->
  <circle cx="100" cy="100" r="90" fill="url(#grad1)"></circle>

  <!-- Open Book -->
  <path d="M60 130 Q100 100 140 130 L140 80 Q100 50 60 80 Z" fill="#ffffff" opacity="0.9"></path>

  <!-- Book Line -->
  <line x1="100" y1="55" x2="100" y2="130" stroke="#4F46E5" stroke-width="2"></line>

  <!-- Graduation Cap -->
  <polygon points="70,70 100,55 130,70 100,85" fill="#ffffff"></polygon>
  <rect x="90" y="85" width="20" height="5" fill="#ffffff"></rect>

  <!-- Digital Nodes -->
  <circle cx="60" cy="50" r="3" fill="#ffffff"></circle>
  <circle cx="140" cy="50" r="3" fill="#ffffff"></circle>
  <circle cx="100" cy="30" r="3" fill="#ffffff"></circle>

  <!-- Connecting Lines -->
  <line x1="60" y1="50" x2="100" y2="30" stroke="#ffffff" stroke-width="1"></line>
  <line x1="140" y1="50" x2="100" y2="30" stroke="#ffffff" stroke-width="1"></line>
</svg>